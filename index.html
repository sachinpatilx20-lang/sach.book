<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sach.in – Premium Pro Link Manager</title>
    <meta name="description" content="The ultimate, pro-grade link manager. Aesthetic, powerful, and private.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pro-version">
    <canvas id="particles"></canvas>
    
    <div id="app">
        <!-- Pro Header -->
        <header class="pro-header">
            <div class="container header-grid">
                <div class="logo-wrap">
                    <h1 class="logo">Sach<span>.in</span> <span class="badge-pro">PRO</span></h1>
                </div>
                
                <div class="search-wrap">
                    <div class="pro-search">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="searchInput" placeholder="Search with AI intuition..." autocomplete="off">
                    </div>
                </div>

                <div class="controls-wrap">
                    <button id="importBtn" class="ctl-btn" title="Import JSON">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </button>
                    <button id="exportBtn" class="ctl-btn" title="Export JSON">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Dynamic Filter Bar -->
        <div class="filter-bar container">
            <div id="tagCloud" class="tag-cloud">
                <button class="tag-chip active" data-tag="all">All Links</button>
                <button class="tag-chip" data-tag="fav">Favorites</button>
                <!-- Dynamic tags injected here -->
            </div>
            <div class="sort-wrap">
                <select id="sortSelect" class="pro-select">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="az">A - Z</option>
                    <option value="domain">By Domain</option>
                </select>
            </div>
        </div>

        <!-- Main Workspace -->
        <main class="container">
            <div id="linksGrid" class="links-grid">
                <!-- Pro cards injected here -->
            </div>
        </main>

        <!-- The Ultimate FAB -->
        <button id="fab" class="pro-fab" aria-label="Add Premium Link">
            <div class="fab-inner">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>
        </button>

        <!-- Pro Modal (Universal for Add/Edit) -->
        <div id="overlay" class="overlay"></div>
        <div id="proModal" class="pro-modal">
            <div class="modal-header">
                <h2 id="modalTitle">Elevate a New Link</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            
            <div class="modal-body">
                <div class="pro-field">
                    <label>Resource URL</label>
                    <input type="url" id="linkInput" placeholder="https://..." autocomplete="off">
                </div>

                <div id="proPreview" class="pro-preview hidden">
                    <div class="preview-glass">
                        <div class="preview-hero">
                            <img id="previewImg" src="" alt="Thumbnail">
                            <div class="preview-badge">PRO PREVIEW</div>
                        </div>
                        <div class="preview-content">
                            <input type="text" id="editTitle" class="edit-input title" placeholder="Manual Title">
                            <textarea id="editDesc" class="edit-input desc" placeholder="Manual Description"></textarea>
                            
                            <div class="tag-input-wrap">
                                <label>Premium Tags (comma separated)</label>
                                <input type="text" id="editTags" placeholder="Design, Tech, Inspiration">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <div id="modalLoader" class="pro-loader hidden"></div>
                    <button id="saveBtn" class="btn-pro-primary" disabled>Commit Link</button>
                </div>
            </div>
        </div>

        <!-- Hidden File Input for Import -->
        <input type="file" id="importInput" accept=".json" style="display: none;">
        
        <!-- Pro Toast -->
        <div id="toast" class="pro-toast"></div>
    </div>

    <!-- Background Matrix/Particles Effect Logic inside script.js -->
    <script src="script.js"></script>
</body>
</html>
